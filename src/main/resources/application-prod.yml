spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.example.gamestore: INFO

app:
  upload:
    dir: ${APP_UPLOAD_DIR:/tmp/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:*}
