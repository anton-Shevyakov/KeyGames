spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.springframework.web: WARN
    com.example.gamestore: INFO

app:
  upload:
    dir: ${APP_UPLOAD_DIR:/tmp/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:*}
